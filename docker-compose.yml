services:
  db:
    container_name: hh_db
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: hh
      POSTGRES_PASSWORD: hh_local_pw
      POSTGRES_DB: hh
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hh -d hh"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - default

  prefect-server:
    container_name: prefect_server
    image: prefecthq/prefect:3-latest
    restart: unless-stopped
    command: prefect server start --host 0.0.0.0 --port 4200
    depends_on:
      db:
        condition: service_healthy
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://hh:hh_local_pw@db:5432/prefect
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_UI_API_URL: /api
    networks:
      - default

  hh-orchestrator:
    container_name: hh_orchestrator
    image: hh_applicant_tool:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: python -m orchestration.serve
    depends_on:
      db:
        condition: service_healthy
      prefect-server:
        condition: service_started
    volumes:
      - .:/app
      - /etc/localtime:/etc/localtime:ro
    environment:
      - CONFIG_DIR=/app/config
      - HH_DB_DSN=postgresql://hh:hh_local_pw@db:5432/hh
      - HH_DB_SCHEMA=public
      - PREFECT_API_URL=http://prefect-server:4200/api
      - ORCH_ENABLED=all
    networks:
      - default
      - test-llm

  prefect-proxy:
    container_name: prefect_proxy
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - prefect-server
    volumes:
      - ./nginx/prefect.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    ports:
      - "4200:4200"
    networks:
      - default

  hh-web:
    container_name: hh_web
    image: hh_applicant_tool:latest
    restart: always
    command: python -u -m uvicorn services.web_app:app --host 0.0.0.0 --port 60080
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /etc/localtime:/etc/localtime:ro
    environment:
      - CONFIG_DIR=/app/config
      - HH_DB_DSN=postgresql://hh:hh_local_pw@db:5432/hh
      - HH_DB_SCHEMA=public
    ports:
      - "127.0.0.1:60080:60080"
    networks:
      - default
      - test-llm

  hh-listener:
    container_name: hh_listener
    image: hh_applicant_tool:latest
    restart: always
    command: python -u /app/services/tg_connect_bot.py
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /etc/localtime:/etc/localtime:ro
    environment:
      - CONFIG_DIR=/app/config
      - HH_DB_DSN=postgresql://hh:hh_local_pw@db:5432/hh
      - HH_DB_SCHEMA=public
      - HH_ACCOUNT=egor
      - PYTHONPATH=/app/services
    networks:
      - default
      - test-llm

volumes:
  pgdata:

networks:
  test-llm:
    external: true
    name: test-llm_default
