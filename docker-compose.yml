services:
  db:
    container_name: hh_db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hh
      POSTGRES_PASSWORD: hh_local_pw
      POSTGRES_DB: hh
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hh -d hh"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - default

  hh_applicant_tool:
    container_name: hh_applicant_tool
    image: hh_applicant_tool:latest
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
      # Пробрасываем таймзону хоста
      - /etc/localtime:/etc/localtime:ro
    # Mini App бэкенд (uvicorn) — только на localhost хоста; наружу через nginx+TLS
    ports:
      - "127.0.0.1:60080:60080"
    restart: unless-stopped
    environment:
      # Это не трогаем
      - CONFIG_DIR=/app/config
      # Postgres. Схема выбирается run_all.py per-юзер из public.app_users.
      # HH_DB_SCHEMA по умолчанию (для прямых ручных команд) = public.
      - HH_DB_DSN=postgresql://hh:hh_local_pw@db:5432/hh
      - HH_DB_SCHEMA=public
      # Смените или закомментируйте при проблемах
      - TERM=${TERM}
      # Если время на сервере отличается
      # - TZ=Europe/Moscow
    healthcheck:
      # cron-демон жив? если умрёт — контейнер unhealthy, restart-policy сработает
      test: ["CMD-SHELL", "pgrep cron >/dev/null || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
    networks:
      - default
      # Локальная LLM (vLLM) живёт в стеке /var/www/test-llm — цепляемся к его сети,
      # чтобы резолвить host "vllm" для сопроводительных писем.
      - test-llm

volumes:
  pgdata:

networks:
  test-llm:
    external: true
    name: test-llm_default
